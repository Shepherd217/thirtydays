<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribed — ThirtyDays</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0f1e; color: #e8eaed;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: #111827; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 60px 48px; text-align: center; max-width: 480px;
        }
        .icon { font-size: 56px; margin-bottom: 24px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: #fff; }
        p { font-size: 16px; color: #718096; line-height: 1.6; margin-bottom: 32px; }
        a { color: #63b3ed; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
        .logo { font-size: 18px; font-weight: 800; color: #fff; margin-top: 32px; }
        .logo span { color: #63b3ed; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#128546;</div>
        <h1>You've been unsubscribed</h1>
        <p>
            You'll no longer receive milestone reminders.<br>
            Your grants are still tracked — but you'll need to check the dashboard yourself.<br><br>
            Your 30-day deadline won't wait for you to remember.
        </p>
        <p style="font-size:14px;">
            <a href="/">Go to ThirtyDays</a>
        </p>
        <div class="logo">Thirty<span>Days</span></div>
    </div>
</body>
</html>
