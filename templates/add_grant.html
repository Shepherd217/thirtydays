<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Your Grant — ThirtyDays</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0f1e; --card: #111827; --border: rgba(255,255,255,0.08);
            --text: #e8eaed; --muted: #718096; --blue: #63b3ed;
            --blue-dim: rgba(99,179,237,0.15); --green: #68d391;
            --green-dim: rgba(104,211,145,0.15); --red: #fc8181;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 640px; margin: 0 auto; }
        header { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
        .back { color: var(--muted); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
        .back:hover { color: var(--blue); }
        .logo { font-size: 18px; font-weight: 800; color: #fff; margin-left: auto; }
        .logo span { color: var(--blue); }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .sub { color: var(--muted); font-size: 16px; margin-bottom: 36px; line-height: 1.5; }
        .sub strong { color: var(--red); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .required { color: var(--red); }
        input, select { width: 100%; padding: 14px 16px; font-size: 16px; font-family: 'Inter', sans-serif; background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text); outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: var(--blue); }
        input::placeholder { color: var(--muted); }
        select { cursor: pointer; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .col { grid-column: span 2; }
        .col-span-1 { grid-column: span 1; }
        .savings-preview {
            background: var(--green-dim); border: 1px solid rgba(104,211,145,0.25);
            border-radius: 12px; padding: 20px; margin-bottom: 28px; display: none;
        }
        .savings-preview.visible { display: block; }
        .savings-label { font-size: 12px; color: var(--green); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .savings-amount { font-size: 36px; font-weight: 800; color: var(--green); margin-top: 4px; }
        .savings-note { font-size: 13px; color: var(--muted); margin-top: 4px; }
        .btn { width: 100%; padding: 16px; font-size: 16px; font-weight: 700; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, var(--blue), #4299e1); color: #0a0f1e; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,179,237,0.35); }
        .help { margin-top: 20px; font-size: 13px; color: var(--muted); text-align: center; }
        .help a { color: var(--blue); text-decoration: none; }
        @media (max-width: 500px) { .row { grid-template-columns: 1fr; } .col { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/dashboard?email={{ email }}" class="back">&#8592; Back to dashboard</a>
            <div class="logo">Thirty<span>Days</span></div>
        </header>
        
        <h1>Add Your Equity Grant</h1>
        <p class="sub">{% if first %}This starts your 30-day countdown. <strong>Don't wait.</strong>{% else %}Track another grant's 30-day window.{% endif %}</p>
        
        <div class="card">
            <form method="POST">
                <input type="hidden" name="email" value="{{ email }}">
                
                <div class="form-group">
                    <label>Grant Date <span class="required">*</span></label>
                    <input type="date" name="grant_date" required>
                </div>
                
                <div class="form-group">
                    <label>Grant Type</label>
                    <select name="grant_type">
                        <option value="ISO">ISO (Incentive Stock Option)</option>
                        <option value="NSO">NSO (Non-Qualified Stock Option)</option>
                        <option value="RSU">RSU (Restricted Stock Unit)</option>
                        <option value="Restricted Stock">Restricted Stock</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" name="company_name" placeholder="e.g., Acme Corp">
                </div>
                
                <div class="row">
                    <div class="form-group col-span-1">
                        <label>Number of Shares</label>
                        <input type="number" name="shares" placeholder="e.g., 100000" min="0">
                    </div>
                    <div class="form-group col-span-1">
                        <label>Strike Price (per share)</label>
                        <input type="number" name="strike_price" placeholder="e.g., 0.001" step="0.0001" min="0">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group col-span-1">
                        <label>Fair Market Value at Grant (per share)</label>
                        <input type="number" name="fair_market_value" placeholder="e.g., 5.00" step="0.01" min="0">
                    </div>
                    <div class="form-group col-span-1">
                        <label>State</label>
                        <select name="state">
                            <option value="">Select state (for 83(b) filing)</option>
                            <option value="AL">Alabama</option><option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option><option value="AR">Arkansas</option>
                            <option value="CA">California</option><option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option><option value="DE">Delaware</option>
                            <option value="FL">Florida</option><option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option><option value="ID">Idaho</option>
                            <option value="IL">Illinois</option><option value="IN">Indiana</option>
                            <option value="IA">Iowa</option><option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option><option value="LA">Louisiana</option>
                            <option value="ME">Maine</option><option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option><option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option><option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option><option value="MT">Montana</option>
                            <option value="NE">Nebraska</option><option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option><option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option><option value="NY">New York</option>
                            <option value="NC">North Carolina</option><option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option><option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option><option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option><option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option><option value="TN">Tennessee</option>
                            <option value="TX">Texas</option><option value="UT">Utah</option>
                            <option value="VT">Vermont</option><option value="VA">Virginia</option>
                            <option value="WA">Washington</option><option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option><option value="WY">Wyoming</option>
                        </select>
                    </div>
                </div>
                
                <div id="savingsPreview" class="savings-preview">
                    <div class="savings-label">Estimated Tax Savings with 83(b)</div>
                    <div class="savings-amount" id="savingsAmount">$0</div>
                    <div class="savings-note">If you file within 30 days</div>
                </div>
                
                <button type="submit" class="btn">Start my 30-day countdown</button>
                <p class="help">We'll send you reminders at every milestone. <a href="/dashboard?email={{ email }}">Skip for now</a></p>
            </form>
        </div>
    </div>
    
    <script>
    document.querySelectorAll('input[name=shares], input[name=strike_price], input[name=fair_market_value]').forEach(function(el) {
        el.addEventListener('input', calculateSavings);
    });
    
    function calculateSavings() {
        var shares = parseFloat(document.querySelector('input[name=shares]').value) || 0;
        var strike = parseFloat(document.querySelector('input[name=strike_price]').value) || 0;
        var fmv = parseFloat(document.querySelector('input[name=fair_market_value]').value) || 0;
        if (shares && fmv) {
            var fullTax = shares * fmv * 0.37;
            var electionTax = shares * strike * 0.37;
            var savings = Math.max(0, fullTax - electionTax);
            if (savings > 0) {
                var preview = document.getElementById('savingsPreview');
                document.getElementById('savingsAmount').textContent = '$' + savings.toLocaleString('en-US', {maximumFractionDigits: 0});
                preview.classList.add('visible');
            }
        }
    }
    </script>
</body>
</html>
